name: smartestate

services:
  db:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-smartestate}_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-smartestate_db}
      MYSQL_USER: ${DB_USER:-smartestate_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-smartestate_pwd}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-smartestate_root}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - smartestate_mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - smartestate_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: ${COMPOSE_PROJECT_NAME:-smartestate}_backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME:-smartestate_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-smartestate_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-smartestate_pwd}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string}
      SERVER_PORT: 8080
    ports:
      - "${BACKEND_PORT:-19412}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smartestate_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    container_name: ${COMPOSE_PROJECT_NAME:-smartestate}_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-18412}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - smartestate_net

networks:
  smartestate_net:
    name: ${COMPOSE_PROJECT_NAME:-smartestate}_net

volumes:
  smartestate_mysql_data:
    name: ${COMPOSE_PROJECT_NAME:-smartestate}_mysql_data
